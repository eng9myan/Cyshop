services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-cyshop_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${DB_NAME:-cyshop_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cyshop_admin} -d ${DB_NAME:-cyshop_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  cyshop-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyshop-backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY must be set in .env}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-cyshop.cy-com.com,localhost,127.0.0.1,cyshop-backend}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-https://cyshop.cy-com.com}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-https://cyshop.cy-com.com}
      USE_SQLITE: "False"
      DB_NAME: ${DB_NAME:-cyshop_db}
      DB_USER: ${DB_USER:-cyshop_admin}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres-db
      DB_PORT: 5432
      REDIS_URL: redis://redis-cache:6379/0
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy

  cyshop-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://cyshop.cy-com.com}
    container_name: cyshop-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://cyshop.cy-com.com}
    depends_on:
      - cyshop-backend

  caddy:
    image: caddy:2-alpine
    container_name: cyshop-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-cyshop.cy-com.com}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@cy-com.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - cyshop-frontend
      - cyshop-backend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
